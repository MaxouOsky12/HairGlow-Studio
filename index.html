<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The World Canvas - Communauté en Temps Réel</title>
    <style>
        /* ----------------------------------------------------
           VARIABLES & THÈME CYBERPUNK / DISCORD
        ---------------------------------------------------- */
        :root {
            --bg-main: #0b0e14;
            --bg-sidebar: #121620;
            --bg-card: rgba(22, 28, 41, 0.6);
            --border-color: rgba(255, 255, 255, 0.08);
            
            --accent-cyan: #00f0ff;
            --accent-pink: #ff007f;
            --accent-green: #00ff66;
            --text-main: #e2e8f0;
            --text-muted: #64748b;
            
            --font-stack: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            --radius-xl: 16px;
            --radius-lg: 12px;
            --radius-md: 8px;
        }

        /* ----------------------------------------------------
           RESET & GLOBALS
        ---------------------------------------------------- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-stack);
            background-color: var(--bg-main);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        input, button {
            font-family: var(--font-stack);
            background: none;
            border: none;
            color: inherit;
        }

        /* Scrollbars stylisées à la Discord */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* ----------------------------------------------------
           HEADER
        ---------------------------------------------------- */
        header {
            height: 60px;
            background-color: var(--bg-sidebar);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            z-index: 10;
        }

        .logo {
            font-weight: 800;
            font-size: 1.2rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(45deg, var(--accent-cyan), var(--accent-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(0, 240, 255, 0.2);
        }

        .stats-global {
            display: flex;
            gap: 16px;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .status-online {
            color: var(--accent-green);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .status-online::before {
            content: '';
            display: inline-block;
            width: 8px;
            height: 8px;
            background-color: var(--accent-green);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--accent-green);
        }

        /* ----------------------------------------------------
           MAIN APP LAYOUT (3 Colonnes)
        ---------------------------------------------------- */
        .app-container {
            display: grid;
            grid-template-columns: 320px 1fr 360px;
            height: calc(100vh - 60px);
            width: 100%;
        }

        /* Style commun aux barres latérales */
        .sidebar {
            background-color: var(--bg-sidebar);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- COLONNE GAUCHE : FACTIONS & CHAT --- */
        .sidebar-left {
            border-right: 1px solid var(--border-color);
        }

        .section-title {
            padding: 20px;
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--text-main);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-action {
            background: linear-gradient(135deg, rgba(0, 240, 255, 0.1), rgba(255, 0, 127, 0.1));
            border: 1px solid var(--accent-cyan);
            color: var(--accent-cyan);
            padding: 6px 12px;
            border-radius: var(--radius-md);
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .btn-action:hover {
            background: var(--accent-cyan);
            color: var(--bg-main);
            box-shadow: 0 0 12px rgba(0, 240, 255, 0.4);
        }

        .factions-list {
            flex: 1;
            overflow-y: auto;
            padding: 0 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .faction-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: border 0.2s ease;
        }
        .faction-card:hover, .faction-card.active {
            border-color: var(--accent-cyan);
            background: rgba(0, 240, 255, 0.02);
        }

        .faction-info h4 {
            font-size: 0.9rem;
            margin-bottom: 2px;
        }
        .faction-info p {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .faction-rank {
            font-weight: 700;
            font-size: 0.85rem;
            color: var(--accent-pink);
            background: rgba(255, 0, 127, 0.1);
            padding: 4px 8px;
            border-radius: var(--radius-md);
        }

        /* Zone Chat de Faction */
        .faction-chat {
            height: 320px;
            border-top: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            background: rgba(10, 12, 18, 0.4);
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .chat-msg {
            font-size: 0.85rem;
            line-height: 1.4;
        }
        .chat-msg .author {
            font-weight: 700;
            color: var(--accent-cyan);
            margin-right: 6px;
        }
        .chat-msg .time {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-left: 6px;
        }

        .chat-input-area {
            padding: 12px;
            display: flex;
            gap: 8px;
        }
        .chat-input {
            flex: 1;
            background: var(--bg-main);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 10px 14px;
            font-size: 0.85rem;
        }
        .chat-input:focus {
            outline: none;
            border-color: var(--accent-pink);
        }

        /* --- COLONNE CENTRALE : LE CANVAS & OUTILS --- */
        .center-canvas-area {
            position: relative;
            background-color: var(--bg-main);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            cursor: grab;
        }
        .center-canvas-area:active {
            cursor: grabbing;
        }

        canvas {
            display: block;
            image-rendering: pixelated;
        }

        /* Conteneur flottant Interface Canvas (Palette / Timer) */
        .canvas-ui-bottom {
            position: absolute;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            pointer-events: none;
            z-index: 5;
        }

        .timer-badge {
            background: rgba(11, 14, 20, 0.85);
            border: 1px solid var(--accent-pink);
            backdrop-filter: blur(12px);
            padding: 8px 18px;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 1px;
            box-shadow: 0 4px 20px rgba(255, 0, 127, 0.25);
            color: #fff;
        }
        .timer-badge.ready {
            border-color: var(--accent-green);
            box-shadow: 0 4px 20px rgba(0, 255, 102, 0.25);
            color: var(--accent-green);
        }

        .palette-container {
            background: rgba(18, 22, 32, 0.85);
            border: 1px solid var(--border-color);
            backdrop-filter: blur(12px);
            padding: 8px;
            border-radius: var(--radius-xl);
            display: flex;
            gap: 8px;
            pointer-events: auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .color-swatch {
            width: 32px;
            height: 32px;
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: transform 0.2s ease, border 0.1s;
            border: 2px solid transparent;
        }
        .color-swatch:hover {
            transform: scale(1.15);
        }
        .color-swatch.selected {
            border-color: #fff;
            transform: scale(1.1);
            box-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        /* Zoom controls */
        .zoom-controls {
            position: absolute;
            right: 24px;
            bottom: 24px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 5;
        }
        .btn-zoom {
            background: rgba(18, 22, 32, 0.85);
            border: 1px solid var(--border-color);
            backdrop-filter: blur(12px);
            width: 40px;
            height: 40px;
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-zoom:hover {
            background: var(--text-main);
            color: var(--bg-main);
        }

        /* --- COLONNE DROITE : GALERIE & AMIS --- */
        .sidebar-right {
            border-left: 1px solid var(--border-color);
        }

        .tabs-header {
            display: flex;
            border-bottom: 1px solid var(--border-color);
            background: rgba(10, 12, 18, 0.2);
        }

        .tab-btn {
            flex: 1;
            padding: 16px;
            text-align: center;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.2s;
            border-bottom: 2px solid transparent;
        }
        .tab-btn:hover {
            color: var(--text-main);
        }
        .tab-btn.active {
            color: var(--accent-cyan);
            border-bottom-color: var(--accent-cyan);
            background: rgba(0, 240, 255, 0.01);
        }

        .tab-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: none;
        }
        .tab-content.active {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Style des Chefs d'oeuvre (Cartes de la Galerie) */
        .masterpiece-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-xl);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .card-preview {
            height: 140px;
            background: repeating-conic-gradient(#161c29 0% 25%, #222b3d 0% 50%) 0 0/20px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .card-preview-art {
            width: 60px;
            height: 60px;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }

        .card-body {
            padding: 14px;
        }

        .card-header-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .card-title {
            font-size: 0.9rem;
            font-weight: 700;
        }
        .card-faction {
            font-size: 0.75rem;
            color: var(--accent-cyan);
        }

        .card-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid rgba(255,255,255,0.04);
        }

        .btn-like {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
            cursor: pointer;
            color: var(--text-muted);
            transition: color 0.2s;
        }
        .btn-like:hover, .btn-like.liked {
            color: var(--accent-pink);
        }

        .comment-section {
            margin-top: 8px;
            font-size: 0.75rem;
            background: rgba(0,0,0,0.2);
            padding: 8px;
            border-radius: var(--radius-md);
        }
        .comment {
            margin-bottom: 4px;
        }
        .comment .user {
            font-weight: 600;
            color: var(--text-main);
        }

        /* Style de la Liste d'Amis */
        .friend-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--bg-card);
            padding: 12px 16px;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-color);
        }

        .friend-meta {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .friend-avatar {
            width: 36px;
            height: 36px;
            background: #2d3748;
            border-radius: 50%;
            position: relative;
        }
        .friend-status {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            position: absolute;
            bottom: 0;
            right: 0;
            border: 2px solid var(--bg-sidebar);
        }
        .friend-status.online { background-color: var(--accent-green); }
        .friend-status.offline { background-color: var(--text-muted); }

        .friend-name {
            font-size: 0.85rem;
            font-weight: 600;
        }
        .friend-sub {
            font-size: 0.75rem;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

    <!-- CONTAINER HEADER -->
    <header>
        <div class="logo">The World Canvas</div>
        <div class="stats-global">
            <div class="status-online"><span id="online-counter">1,342</span> Joueurs</div>
            <div>•</div>
            <div>Total Pixels : 412,891</div>
        </div>
    </header>

    <!-- MAIN CONTAINER APPLICATIF -->
    <div class="app-container">

        <!-- COLONNE GAUCHE : PANNEAU DES GROUPES (FACTIONS) & CHAT -->
        <aside class="sidebar sidebar-left">
            <div class="section-title">
                <span>Factions</span>
                <button class="btn-action" onclick="createFactionMock()">+ Créer</button>
            </div>
            
            <div class="factions-list" id="factions-container">
                <!-- Rempli dynamiquement par JS -->
            </div>

            <!-- CHAT ZONE -->
            <div class="faction-chat">
                <div class="section-title" style="padding: 12px 16px; border-bottom: 1px solid var(--border-color); background: rgba(0,0,0,0.1)">
                    <span id="chat-title" style="font-size:0.8rem; color:var(--accent-cyan)">Chat : Global</span>
                </div>
                <div class="chat-messages" id="chat-messages-container">
                    <!-- Rempli dynamiquement -->
                </div>
                <div class="chat-input-area">
                    <input type="text" class="chat-input" id="chat-input-field" placeholder="Discuter avec la faction..." onkeydown="if(event.key === 'Enter') sendChatMessage()">
                    <button class="btn-action" onclick="sendChatMessage()">Envoyer</button>
                </div>
            </div>
        </aside>

        <!-- COLONNE CENTRALE : LE CANVAS PRINCIPAL -->
        <main class="center-canvas-area" id="canvas-view-viewport">
            <canvas id="main-pixel-canvas"></canvas>

            <!-- Éléments d'interface utilisateur superposés -->
            <div class="canvas-ui-bottom">
                <div class="timer-badge ready" id="cooldown-timer-display">Prêt à dessiner !</div>
                
                <div class="palette-container" id="color-palette-container">
                    <!-- Rempli dynamiquement -->
                </div>
            </div>

            <div class="zoom-controls">
                <button class="btn-zoom" onclick="adjustZoom(1.2)">+</button>
                <button class="btn-zoom" onclick="adjustZoom(0.8)">-</button>
            </div>
        </main>

        <!-- COLONNE DROITE : GALERIE & L'ONGLET SOCIAL -->
        <aside class="sidebar sidebar-right">
            <div class="tabs-header">
                <div class="tab-btn active" onclick="switchTab('masterpieces')">Chefs-d'œuvre</div>
                <div class="tab-btn" onclick="switchTab('friends')">Amis</div>
            </div>

            <!-- Onglet 1 : Galerie -->
            <div class="tab-content active" id="tab-masterpieces">
                <!-- Carte 1 -->
                <div class="masterpiece-card">
                    <div class="card-preview">
                        <!-- Simulation d'un petit visuel pixel art -->
                        <div class="card-preview-art" style="background: linear-gradient(to right, red 50%, blue 50%); border-radius: 4px;"></div>
                    </div>
                    <div class="card-body">
                        <div class="card-header-info">
                            <span class="card-title">Drapeau Pixel</span>
                            <span class="card-faction">Team France</span>
                        </div>
                        <div class="comment-section">
                            <div class="comment"><span class="user">Thomas:</span> Propre la symétrie !</div>
                            <div class="comment"><span class="user">Chloé:</span> On défend la zone nord-est !</div>
                        </div>
                        <div class="card-actions">
                            <button class="btn-like" onclick="toggleLike(this)">❤️ <span class="like-count">142</span></button>
                        </div>
                    </div>
                </div>

                <!-- Carte 2 -->
                <div class="masterpiece-card">
                    <div class="card-preview">
                        <div class="card-preview-art" style="background: repeating-linear-gradient(45deg, yellow, yellow 10px, black 10px, black 20px); border-radius: 4px;"></div>
                    </div>
                    <div class="card-body">
                        <div class="card-header-info">
                            <span class="card-title">Cyber Logo</span>
                            <span class="card-faction">Cyber Knights</span>
                        </div>
                        <div class="comment-section">
                            <div class="comment"><span class="user">Neo:</span> Sublime les gars.</div>
                        </div>
                        <div class="card-actions">
                            <button class="btn-like" onclick="toggleLike(this)">❤️ <span class="like-count">89</span></button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Onglet 2 : Amis -->
            <div class="tab-content" id="tab-friends">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
                    <span style="font-size:0.8rem; color:var(--text-muted)">Membres Connectés</span>
                    <button class="btn-action" onclick="simulateFriendRequest()">+ Simuler Demande</button>
                </div>
                <div id="friends-list-container" style="display:flex; flex-direction:column; gap:10px;">
                    <!-- Rempli dynamiquement -->
                </div>
            </div>
        </aside>

    </div>

    <!-- ----------------------------------------------------
       LOGIQUE JAVASCRIPT ET SIMULATION DE CONTEXTE
    ---------------------------------------------------- -->
    <script>
        // CONFIGURATION DU CANVAS DE BASE
        const GRID_SIZE = 128; // Matrice de 128x128 pixels
        const INITIAL_PIXEL_DISPLAY_SIZE = 20; // Taille virtuelle par défaut d'un pixel en surface d'affichage

        // STRUCTURE DE DONNÉES ET ÉTAT DE L'APPLICATION
        let canvasMatrix = Array(GRID_SIZE).fill(null).map(() => Array(GRID_SIZE).fill('#161c29'));
        let selectedColor = '#00f0ff';
        let currentFaction = 'Global';
        let isCooldownActive = false;
        let cooldownTimeRemaining = 0;

        // PARAMÈTRES DU MOTEUR DE PAN & ZOOM VISUEL
        const canvas = document.getElementById('main-pixel-canvas');
        const ctx = canvas.getContext('2d');
        const viewport = document.getElementById('canvas-view-viewport');

        let scale = 1;
        let offsetX = 0;
        let offsetY = 0;
        let isDragging = false;
        let startX, startY;

        // COULEURS DE LA PALETTE MINIMALISTE (8 Couleurs)
        const PALETTE_COLORS = [
            '#ffffff', '#0b0e14', '#ff0055', '#00f0ff', 
            '#00ff66', '#ffb700', '#ab20fd', '#ff6b00'
        ];

        // DONNÉES FACTICES INITIALES (MOCK DATA)
        let factions = [
            { id: 'global', name: 'Global', members: 1342, rank: 0 },
            { id: 'team-france', name: 'Team France', members: 420, rank: 1 },
            { id: 'cyber-knights', name: 'Cyber Knights', members: 298, rank: 2 },
            { id: 'otaku-clan', name: 'Otaku Clan', members: 185, rank: 3 }
        ];

        let friends = [
            { name: 'Alex_Néom', status: 'online', activity: 'Dessine un pixel' },
            { name: 'Sora99', status: 'online', activity: 'Défend la zone Ouest' },
            { name: 'Kira_XR', status: 'offline', activity: 'Inactif depuis 2h' }
        ];

        /* ----------------------------------------------------
           INITIALISATION DE L'APPLICATION
        ---------------------------------------------------- */
        window.addEventListener('load', () => {
            initCanvasSize();
            centerCanvasView();
            generatePalette();
            renderFactions();
            renderFriends();
            drawCanvas();

            // Génération de quelques pixels de démo au centre
            createMockArtPiece();

            // Configuration des événements d'interaction Canvas
            viewport.addEventListener('mousedown', startPan);
            viewport.addEventListener('mousemove', panMove);
            window.addEventListener('mouseup', endPan);
            viewport.addEventListener('wheel', handleWheelZoom, { passive: false });

            // Événement clic sur le canvas
            canvas.addEventListener('click', handleCanvasClick);
            
            // Simulation d'écouteurs de notifications réseau en arrière-plan
            setInterval(simulateIncomingPixels, 4000);
        });

        // Adapte la taille physique du canvas HTML5 à son conteneur virtuel
        function initCanvasSize() {
            canvas.width = GRID_SIZE * INITIAL_PIXEL_DISPLAY_SIZE;
            canvas.height = GRID_SIZE * INITIAL_PIXEL_DISPLAY_SIZE;
        }

        // Centre l'affichage initial de l'espace de dessin
        function centerCanvasView() {
            offsetX = (viewport.clientWidth - canvas.width) / 2;
            offsetY = (viewport.clientHeight - canvas.height) / 2;
        }

        /* ----------------------------------------------------
           MOTEUR DE RENDU DU CANVAS (DRAW LOOP VISUEL)
        ---------------------------------------------------- */
        function drawCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            ctx.save();
            // Applique la matrice de transformation pour le déplacement et zoom fluide
            ctx.translate(offsetX, offsetY);
            ctx.scale(scale, scale);

            // 1. Dessiner le fond et les pixels existants
            for (let y = 0; y < GRID_SIZE; y++) {
                for (let x = 0; x < GRID_SIZE; x++) {
                    ctx.fillStyle = canvasMatrix[y][x];
                    ctx.fillRect(
                        x * INITIAL_PIXEL_DISPLAY_SIZE, 
                        y * INITIAL_PIXEL_DISPLAY_SIZE, 
                        INITIAL_PIXEL_DISPLAY_SIZE, 
                        INITIAL_PIXEL_DISPLAY_SIZE
                    );
                }
            }

            // 2. Grille fine de délimitation (visible uniquement à fort zoom)
            if (scale > 0.6) {
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.03)';
                ctx.lineWidth = 0.5;
                for (let i = 0; i <= GRID_SIZE; i++) {
                    // Lignes verticales
                    ctx.beginPath();
                    ctx.moveTo(i * INITIAL_PIXEL_DISPLAY_SIZE, 0);
                    ctx.lineTo(i * INITIAL_PIXEL_DISPLAY_SIZE, GRID_SIZE * INITIAL_PIXEL_DISPLAY_SIZE);
                    ctx.stroke();

                    // Lignes horizontales
                    ctx.beginPath();
                    ctx.moveTo(0, i * INITIAL_PIXEL_DISPLAY_SIZE);
                    ctx.lineTo(GRID_SIZE * INITIAL_PIXEL_DISPLAY_SIZE, i * INITIAL_PIXEL_DISPLAY_SIZE);
                    ctx.stroke();
                }
            }

            ctx.restore();
        }

        /* ----------------------------------------------------
           GESTIONNAIRES D'ÉVÉNEMENTS : CONTROLES CANVAS
        ---------------------------------------------------- */
        function startPan(e) {
            // Empêche le drag si on clique spécifiquement sur des contrôles UI superposés
            if (e.target !== viewport && e.target !== canvas) return;
            isDragging = true;
            startX = e.clientX - offsetX;
            startY = e.clientY - offsetY;
        }

        function panMove(e) {
            if (!isDragging) return;
            offsetX = e.clientX - startX;
            offsetY = e.clientY - startY;
            drawCanvas();
        }

        function endPan() {
            isDragging = false;
        }

        function handleWheelZoom(e) {
            e.preventDefault();
            const zoomFactor = 1.1;
            if (e.deltaY < 0) {
                adjustZoom(zoomFactor, e.clientX, e.clientY);
            } else {
                adjustZoom(1 / zoomFactor, e.clientX, e.clientY);
            }
        }

        function adjustZoom(factor, clientX = viewport.clientWidth / 2, clientY = viewport.clientHeight / 2) {
            const newScale = Math.max(0.15, Math.min(scale * factor, 15));
            
            // Zoom centré sur la position de la souris (ou centre de l'écran par défaut)
            offsetX = clientX - (clientX - offsetX) * (newScale / scale);
            offsetY = clientY - (clientY - offsetY) * (newScale / scale);
            
            scale = newScale;
            drawCanvas();
        }

        /* ----------------------------------------------------
           LOGIQUE DE POSE DE PIXEL COULÉ & COMPTE À REBOURS
        ---------------------------------------------------- */
        function handleCanvasClick(e) {
            // Si l'utilisateur est en cours de drag/déplacement, on n'applique pas le clic de dessin
            if (isDragging) return;

            // Obtenir les coordonnées relatives au canvas physique
            const rect = canvas.getBoundingClientRect();
            const xOnCanvasSpace = (e.clientX - rect.left) / scale;
            const yOnCanvasSpace = (e.clientY - rect.top) / scale;

            // Traduction en index de cellule matricielle
            const gridX = Math.floor(xOnCanvasSpace / INITIAL_PIXEL_DISPLAY_SIZE);
            const gridY = Math.floor(yOnCanvasSpace / INITIAL_PIXEL_DISPLAY_SIZE);

            // Vérification de débordement de grille
            if (gridX >= 0 && gridX < GRID_SIZE && gridY >= 0 && gridY < GRID_SIZE) {
                if (isCooldownActive) {
                    alert("Votre compte à rebours de rareté est encore actif ! Veuillez patienter.");
                    return;
                }

                executePixelPlacement(gridX, gridY, selectedColor);
            }
        }

        function executePixelPlacement(x, y, color) {
            // Modification locale de l'état
            canvasMatrix[y][x] = color;
            drawCanvas();

            // Enclencher le cooldown de rareté (Simulé à 15 secondes pour les tests au lieu de 24h)
            triggerPixelCooldown(15);

            /* 🔥 SUPABASE REALTIME PLUG :
               Ici, envoyer la requête d'écriture de pixel à votre base de données Supabase.
               Exemple :
               const { data, error } = await supabase
                 .from('canvas_pixels')
                 .upsert({ coordinate_x: x, coordinate_y: y, color_hex: color, user_faction: currentFaction });
            */
        }

        function triggerPixelCooldown(seconds) {
            isCooldownActive = true;
            cooldownTimeRemaining = seconds;
            const timerBadge = document.getElementById('cooldown-timer-display');
            timerBadge.classList.remove('ready');

            const interval = setInterval(() => {
                cooldownTimeRemaining--;
                
                let mins = Math.floor(cooldownTimeRemaining / 60);
                let secs = cooldownTimeRemaining % 60;
                timerBadge.innerText = `Prochain pixel dans : ${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;

                if (cooldownTimeRemaining <= 0) {
                    clearInterval(interval);
                    isCooldownActive = false;
                    timerBadge.classList.add('ready');
                    timerBadge.innerText = "Prêt à dessiner !";
                }
            }, 1000);
        }

        /* ----------------------------------------------------
           INTERFACE : GENERATION COMPOSANTS INTERACTIFS
        ---------------------------------------------------- */
        function generatePalette() {
            const container = document.getElementById('color-palette-container');
            container.innerHTML = '';
            PALETTE_COLORS.forEach((color, index) => {
                const swatch = document.createElement('div');
                swatch.className = `color-swatch ${color === selectedColor ? 'selected' : ''}`;
                swatch.style.backgroundColor = color;
                swatch.addEventListener('click', () => {
                    document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
                    swatch.classList.add('selected');
                    selectedColor = color;
                });
                container.appendChild(swatch);
            });
        }

        function renderFactions() {
            const container = document.getElementById('factions-container');
            container.innerHTML = '';
            factions.forEach(faction => {
                const card = document.createElement('div');
                card.className = `faction-card ${faction.name === currentFaction ? 'active' : ''}`;
                card.onclick = () => selectFaction(faction.name);

                card.innerHTML = `
                    <div class="faction-info">
                        <h4>${faction.name}</h4>
                        <p>${faction.members.toLocaleString()} membres</p>
                    </div>
                    ${faction.rank > 0 ? `<div class="faction-rank">#${faction.rank}</div>` : `<div class="faction-rank" style="background:rgba(255,255,255,0.05); color:var(--text-muted)">-</div>`}
                `;
                container.appendChild(card);
            });
        }

        function selectFaction(factionName) {
            currentFaction = factionName;
            document.getElementById('chat-title').innerText = `Chat : ${factionName}`;
            renderFactions();
            
            // Vider l'historique visuel pour simuler le changement de salle de chat
            const chatContainer = document.getElementById('chat-messages-container');
            chatContainer.innerHTML = `<div class="chat-msg" style="color: var(--text-muted); text-align:center; font-size:0.75rem;">Vous avez rejoint le canal de ${factionName}</div>`;
            
            /* 🔥 SUPABASE REALTIME PLUG :
               Désabonner l'ancien canal temps réel et s'abonner au flux du nouveau groupe :
               supabase.channel(`chat:${factionName}`).on('postgres_changes', ...).subscribe()
            */
        }

        function createFactionMock() {
            const name = prompt("Entrez le nom de votre nouvelle faction :");
            if (name && name.trim() !== "") {
                factions.push({
                    id: name.toLowerCase().replace(/\s+/g, '-'),
                    name: name.trim(),
                    members: 1,
                    rank: factions.length
                });
                renderFactions();
                selectFaction(name.trim());

                /* 🔥 SUPABASE REALTIME PLUG :
                   Insérer la nouvelle faction dans votre table distribuée.
                */
            }
        }

        /* ----------------------------------------------------
           GESTION DU CHAT SCRIPTÉ
        ---------------------------------------------------- */
        function sendChatMessage() {
            const input = document.getElementById('chat-input-field');
            const text = input.value.trim();
            if (text === '') return;

            const container = document.getElementById('chat-messages-container');
            const now = new Date();
            const timeStr = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;

            const msgEl = document.createElement('div');
            msgEl.className = 'chat-msg';
            msgEl.innerHTML = `
                <span class="author">Moi</span>
                <span class="time">${timeStr}</span>
                <div style="color: #cbd5e1; margin-top:2px;">${escapeHTML(text)}</div>
            `;
            
            container.appendChild(msgEl);
            container.scrollTop = container.scrollHeight;
            input.value = '';

            /* 🔥 SUPABASE REALTIME PLUG :
               Envoyer le message texte via Supabase Broadcast ou insertion en table
               await supabase.from('faction_messages').insert({ body: text, faction: currentFaction });
            */
        }

        /* ----------------------------------------------------
           INTERFACE : NAVIGATION PAR ONGLETS (COLONNE DROITE)
        ---------------------------------------------------- */
        function switchTab(tabId) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));

            event.target.classList.add('active');
            document.getElementById(`tab-${tabId}`).classList.add('active');
        }

        function toggleLike(btn) {
            btn.classList.toggle('liked');
            const countEl = btn.querySelector('.like-count');
            let currentLikes = parseInt(countEl.innerText);
            if (btn.classList.contains('liked')) {
                countEl.innerText = currentLikes + 1;
            } else {
                countEl.innerText = currentLikes - 1;
            }
            /* 🔥 SUPABASE REALTIME PLUG : Incrementer / décrémenter le compteur de Likes de l'œuvre globale */
        }

        function renderFriends() {
            const container = document.getElementById('friends-list-container');
            container.innerHTML = '';
            friends.forEach(f => {
                const div = document.createElement('div');
                div.className = 'friend-row';
                div.innerHTML = `
                    <div class="friend-meta">
                        <div class="friend-avatar">
                            <div class="friend-status ${f.status}"></div>
                        </div>
                        <div>
                            <div class="friend-name">${f.name}</div>
                            <div class="friend-sub">${f.activity}</div>
                        </div>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function simulateFriendRequest() {
            const name = prompt("Entrez le pseudo de l'ami à rechercher/simuler :");
            if (name) {
                friends.push({
                    name: name.trim(),
                    status: 'online',
                    activity: 'Vient de vous rejoindre'
                });
                renderFriends();
            }
        }

        /* ----------------------------------------------------
           FONCTIONS OUTILS / MOCK SIMULATIONS GÉNÉRATEURS
        ---------------------------------------------------- */
        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, 
                tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
            );
        }

        function createMockArtPiece() {
            // Dessine une petite croix cyan/rose pré-générée au centre de la grille globale
            const mid = Math.floor(GRID_SIZE / 2);
            for (let i = -5; i <= 5; i++) {
                canvasMatrix[mid][mid + i] = '#00f0ff';
                canvasMatrix[mid + i][mid] = '#ff0055';
            }
        }

        // Simule d'autres joueurs posant des pixels n'importe où sur l'application en arrière-plan
        function simulateIncomingPixels() {
            const randomX = Math.floor(Math.random() * GRID_SIZE);
            const randomY = Math.floor(Math.random() * GRID_SIZE);
            const randomColor = PALETTE_COLORS[Math.floor(Math.random() * PALETTE_COLORS.length)];
            
            canvasMatrix[randomY][randomX] = randomColor;
            drawCanvas();

            /* 🔥 SUPABASE REALTIME PLUG : 
               C'est ici que l'écouteur en temps réel de Supabase interviendra pour mettre à jour la vue globale !
               supabase
                 .channel('schema-db-changes')
                 .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'canvas_pixels' }, payload => {
                     const p = payload.new;
                     canvasMatrix[p.coordinate_y][p.coordinate_x] = p.color_hex;
                     drawCanvas();
                 }).subscribe();
            */
        }
    </script>
